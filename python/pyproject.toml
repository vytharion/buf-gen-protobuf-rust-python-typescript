[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "monorepo-pb"
version = "0.1.0"
description = "Protobuf + gRPC Python stubs for the monorepo.v1 schemas, regenerated by `buf generate`."
readme = "src/monorepo_pb/README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "vytharion" }]
keywords = ["protobuf", "grpc", "buf", "monorepo"]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Code Generators",
]
dependencies = [
    "protobuf>=4.25,<6",
    "grpcio>=1.60",
]

[project.optional-dependencies]
dev = [
    "grpcio-tools>=1.60",
    "mypy>=1.8",
    "mypy-protobuf>=3.5",
    "ruff>=0.5",
]

[project.urls]
Homepage = "https://github.com/vytharion/buf-gen-protobuf-rust-python-typescript"
Repository = "https://github.com/vytharion/buf-gen-protobuf-rust-python-typescript"

[tool.setuptools.packages.find]
where = ["src"]
include = ["monorepo_pb*"]

[tool.setuptools.package-data]
"monorepo_pb" = ["py.typed", "gen/**/*.pyi"]

[tool.mypy]
strict = true
python_version = "3.9"
mypy_path = "src"
exclude = ["src/monorepo_pb/gen/monorepo"]

[tool.ruff]
line-length = 100
target-version = "py39"
extend-exclude = ["src/monorepo_pb/gen/monorepo"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
